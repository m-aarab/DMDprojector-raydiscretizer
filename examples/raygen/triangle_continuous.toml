[projection]
width = 600.0
height = 600.0
axis = "y"
direction = 1
focus_plane_position = 50.0
source_plane_position = -400.0
center = [0.0, 300.0]

[emission]
origin_type = "continuous"
base_intensity = 2.0

[focus]
mode = "collimated"
cone_half_angle_deg = 0.0

[mask]
type = "triangle"
base = 500.0
height = 500.0
offset = [0.0, 0.0]

[continuous]
n_rays = 2000000

[output]
output_folder = "./output"
output_filename = "triangle_continuous.ry"
batch_count = 1
overwrite = true
seed = 42

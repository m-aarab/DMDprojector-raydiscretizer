[projection]
width = 600.0
height = 600.0
axis = "y"
direction = 1
focus_plane_position = 50.0
source_plane_position = -200.0
center = [0.0, 300.0]

[emission]
origin_type = "pixelated"
base_intensity = 2.0

[focus]
mode = "focused"
cone_half_angle_deg = 8.0

[mask]
type = "annulus"
outer_radius = 240.0
inner_radius = 120.0
offset = [0.0, 0.0]

[pixels]
rays_per_pixel = 4000
pitch = [50.0, 50.0]
size = [50.0, 50.0]
activation_mode = "center"
aa_samples = 8
intensity_mode = "flat"
gaussian_size_type = "1/e2_diameter"

[output]
output_folder = "./output"
output_filename = "annulus_pixelated_focused.ry"
batch_count = 1
overwrite = true
seed = 42
